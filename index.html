<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- SEO Primário -->
    <title>Amaro RPG Idle - Jogo de RPG Roguelite Grátis</title>
    <meta name="description" content="Monte seu herói, esmague hordas de monstros no automático e vire uma lenda! Escolha entre 8 classes, colete equipamentos épicos, evolua habilidades e ascenda infinitamente em Amaro RPG Idle — grátis, direto no navegador, sem baixar nada." />
    <meta name="keywords" content="amaro rpg idle, rpg idle, jogo idle, jogo clicker, rpg roguelite, jogo de rpg grátis, jogo de navegador, jogo sem baixar, prestígio, ascensão, dark fantasy, jogo de aventura" />
    <meta name="author" content="Amaro Costa" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Amaro RPG Idle - Jogo de RPG Roguelite Grátis" />
    <meta property="og:description" content="Escolha seu herói, enfrente hordas de monstros no automático e ascenda cada vez mais forte! Jogue grátis, sem baixar nada." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Amaro RPG Idle - Jogo de RPG Roguelite Grátis" />
    <meta property="twitter:description" content="Escolha seu herói, enfrente hordas de monstros no automático e ascenda cada vez mais forte! Jogue grátis, sem baixar nada." />
    <meta property="twitter:image" content="/icon-512.png" />

    <!-- PWA & Mobile Capabilities -->
    <meta name="theme-color" content="#0b0f19" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Amaro RPG" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="shortcut icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Scripts Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Script de Registro do Service Worker para Instalação PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[PWA] Service Worker registrado com sucesso sob o escopo:', reg.scope);
            })
            .catch((err) => {
              console.error('[PWA] Falha ao registrar o Service Worker:', err);
            });
        });
      }
    </script>
  </head>
  <body style="background-color: #0b0f19; margin: 0; padding: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
